# nginx.conf — serves RevTrack frontend + proxies API
# Place in /etc/nginx/sites-available/revtrack

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # ── Serve frontend static files ──────────────────────────────────────
    root /var/www/revtrack/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy API calls to Node backend ──────────────────────────────────
    location /api/ {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Gzip ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Cache static assets ───────────────────────────────────────────────
    location ~* \.(css|js|ico|png|jpg|jpeg|gif|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
